name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust-nix:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Evaluate flake outputs
        run: |
          nix flake show
          nix eval .#packages.x86_64-linux.shadoword-daemon.drvPath
          nix eval .#packages.x86_64-linux.shadoword-desktop.drvPath

      - name: Build daemon package
        run: nix build .#shadoword-daemon -L --show-trace

      - name: Build desktop package
        run: nix build .#shadoword-desktop -L --show-trace

      - name: Cargo check workspace
        run: nix develop --command cargo check --workspace --features whisper-vulkan
